server.port=8080
spring.application.name=real-estate-agent-finder

# MySQL Database Configuration
# 1) Run database/real_estate_agent_finder.sql in MySQL Workbench
# 2) Change username/password below according to your MySQL setup
spring.datasource.url=jdbc:mysql://localhost:3306/real_estate_agent_finder?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
